<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Velocireader">
<meta name="theme-color" content="#0a0a0c">
<title>Velocireader</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVmVsb2NpcmVhZGVyIiwic2hvcnRfbmFtZSI6IlZlbG9jaXJlYWRlciIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGEwYTBjIiwidGhlbWVfY29sb3IiOiIjMGEwYTBjIn0=">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0c; --surface:#131318; --border:#1e1e26; --text:#e8e6f0;
  --muted:#6b6880; --accent:#ff2d46; --glow:rgba(255,45,70,0.25); --input:#0e0e12;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}

/* Screens */
.screen{display:none;width:100%;height:100%;position:absolute;inset:0;flex-direction:column;align-items:center;overflow:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

/* Glow */
.glow{position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);pointer-events:none;opacity:.4}

/* Library */
.lib-wrap{position:relative;z-index:1;width:100%;max-width:640px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center}
.logo{font-size:2.2rem;font-weight:800;letter-spacing:-1px;margin-top:2.5rem;margin-bottom:.2rem}
.logo b{color:var(--accent);font-weight:800}
.tagline{color:var(--muted);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:2rem;font-weight:300}
.new-btn{width:100%;padding:.85rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:.9rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 24px var(--glow)}
.lib-section-title{font-size:.72rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin:1.5rem 0 .75rem;align-self:flex-start}
.lib-card{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;width:100%;margin-bottom:.5rem;transition:border-color .2s}
.lib-card:active{border-color:var(--muted)}
.lib-card-body{flex:1;min-width:0}
.lib-title-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.lib-title{font-size:.92rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-progress-row{display:flex;align-items:center;gap:.75rem}
.progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.lib-pct{font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.lib-meta{font-size:.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:.25rem}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:4px;display:flex;align-items:center}
.del-btn:active{color:var(--accent)}

/* Input screen */
.input-wrap{position:relative;z-index:1;width:100%;max-width:640px;padding:2rem 1.5rem}
.back-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:.45rem .9rem;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.2rem}
.back-btn:active{border-color:var(--muted);color:var(--text)}
.title-input{width:100%;padding:.7rem 1rem;background:var(--input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;font-weight:600;outline:none;margin-bottom:1rem}
.title-input:focus{border-color:var(--accent)}
.tab-bar{display:flex}
.tab{flex:1;padding:.7rem .75rem;background:transparent;border:1px solid var(--border);border-bottom:none;color:var(--muted);font-size:.78rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:8px 8px 0 0;transition:all .2s}
.tab.active{background:var(--surface);color:var(--text)}
.tab-content{background:var(--surface);border:1px solid var(--border);border-radius:0 0 12px 12px;padding:1.2rem}
.text-area{width:100%;height:200px;background:var(--input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;padding:1rem;resize:none;outline:none}
.text-area:focus{border-color:var(--accent)}
.text-area::placeholder{color:var(--muted);opacity:.5}
.drop-zone{width:100%;height:200px;border:2px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;cursor:pointer;position:relative;transition:border-color .25s}
.drop-zone:active{border-color:var(--accent)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-loaded{color:var(--accent);font-weight:600;font-size:.9rem}
.wpm-row{display:flex;align-items:center;gap:.75rem;margin-top:1.2rem}
.wpm-label{font-size:.75rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;white-space:nowrap}
.wpm-input{width:80px;padding:.6rem .5rem;background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;text-align:center;outline:none}
.wpm-input:focus{border-color:var(--accent)}
.wpm-unit{color:var(--muted);font-size:.75rem;font-weight:300}
.start-btn{flex:1;padding:.7rem 1.5rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 24px var(--glow)}
.start-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.word-count-info{margin-top:.5rem;font-size:.7rem;color:var(--muted);text-align:right;font-family:'JetBrains Mono',monospace;opacity:.6}

/* Reader */
.reader-screen{justify-content:center}
.reader-top{position:absolute;top:0;left:0;right:0;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;z-index:10}
.reader-title{position:absolute;top:3.2rem;left:0;right:0;text-align:center;font-size:.72rem;color:var(--muted);font-weight:300;letter-spacing:1px;opacity:.5;padding:0 4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reader-wpm{display:flex;align-items:center;gap:.5rem}
.reader-wpm input{width:68px;padding:.4rem .5rem;background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;text-align:center;outline:none}
.reader-wpm input:focus{border-color:var(--accent)}
.reader-wpm span{font-size:.7rem;color:var(--muted);letter-spacing:1px}

.focus-area{position:relative;width:100%;display:flex;align-items:center;justify-content:center;min-height:120px;padding:0 .5rem}
.focus-line{position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:linear-gradient(to bottom,transparent,var(--accent) 30%,var(--accent) 70%,transparent);opacity:.15}
.word-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-family:'JetBrains Mono',monospace;font-size:clamp(2.2rem,7vw,4.5rem);font-weight:700;letter-spacing:2px;white-space:nowrap;user-select:none;min-height:1.2em;width:100%}
.w-before{text-align:right;color:var(--text)}
.w-focus{text-align:center;color:var(--accent)}
.w-after{text-align:left;color:var(--text)}
.w-emoji{text-align:center;font-size:3.5rem}

.word-counter{position:absolute;bottom:6.5rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);opacity:.5}
.controls{position:absolute;bottom:2.5rem;display:flex;align-items:center;gap:1.5rem}
.ctrl-btn{background:none;border:1px solid var(--border);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer}
.ctrl-btn:active{border-color:var(--muted);color:var(--text)}
.play-btn{background:none;border:1px solid var(--accent);border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;color:var(--accent);cursor:pointer}
.play-btn:active{background:var(--accent);color:#fff}
.time-remaining{position:absolute;bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);opacity:.4}
.progress-bottom{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.progress-bottom-fill{height:100%;background:var(--accent);transition:width .15s linear}

/* safe areas for notch phones */
@supports(padding-top:env(safe-area-inset-top)){
  .reader-top{padding-top:calc(1rem + env(safe-area-inset-top))}
  .reader-title{top:calc(3.2rem + env(safe-area-inset-top))}
  .lib-wrap,.input-wrap{padding-top:calc(2rem + env(safe-area-inset-top))}
}
</style>
</head>
<body>

<!-- ════════ LIBRARY SCREEN ════════ -->
<div id="libraryScreen" class="screen active">
  <div class="glow"></div>
  <div class="lib-wrap">
    <div class="logo">Veloci<b>reader</b></div>
    <div class="tagline">one word at a time</div>
    <button class="new-btn" onclick="showInput()">+ New Reading</button>
    <div id="libraryList"></div>
  </div>
</div>

<!-- ════════ INPUT SCREEN ════════ -->
<div id="inputScreen" class="screen">
  <div class="glow"></div>
  <div class="input-wrap">
    <button class="back-btn" onclick="showLibrary()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Library
    </button>
    <input id="titleInput" class="title-input" type="text" placeholder="Reading title">
    <div class="tab-bar">
      <button class="tab active" data-tab="text" onclick="switchTab('text')">Paste Text</button>
      <button class="tab" data-tab="file" onclick="switchTab('file')">Upload File</button>
    </div>
    <div class="tab-content">
      <textarea id="textInput" class="text-area" placeholder="Paste or type your text here..."></textarea>
      <div id="dropZone" class="drop-zone" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.35"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <p style="color:var(--muted);font-size:.85rem">Drop a file or tap to browse</p>
        <span style="color:var(--muted);font-size:.68rem;opacity:.5;letter-spacing:1px">PDF / TXT / MD / HTML / CSV</span>
        <input type="file" id="fileInput" accept=".txt,.md,.html,.csv,.json,.log,.xml,.rtf,.pdf">
      </div>
    </div>
    <div class="wpm-row">
      <span class="wpm-label">Speed</span>
      <input type="number" id="wpmInput" class="wpm-input" value="250" min="10" max="2000">
      <span class="wpm-unit">WPM</span>
      <button id="startBtn" class="start-btn" disabled onclick="startNewReading()">Start</button>
    </div>
    <div id="wordCountInfo" class="word-count-info"></div>
  </div>
</div>

<!-- ════════ READER SCREEN ════════ -->
<div id="readerScreen" class="screen reader-screen">
  <div class="reader-top">
    <button class="back-btn" onclick="exitReader()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div class="reader-wpm">
      <input type="number" id="readerWpm" value="250" min="10" max="2000">
      <span>WPM</span>
    </div>
  </div>
  <div id="readerTitle" class="reader-title"></div>

  <div class="focus-area">
    <div class="focus-line"></div>
    <div id="wordBox" class="word-grid">
      <span class="w-before"></span><span class="w-focus"></span><span class="w-after"></span>
    </div>
  </div>

  <div id="wordCounter" class="word-counter"></div>

  <div class="controls">
    <button class="ctrl-btn" onclick="skip(-10)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
    </button>
    <button id="playBtn" class="play-btn" onclick="togglePlay()">
      <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <button class="ctrl-btn" onclick="skip(10)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
    </button>
  </div>

  <div id="timeRemaining" class="time-remaining"></div>
  <div class="progress-bottom"><div id="progressBar" class="progress-bottom-fill"></div></div>
</div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let library = [];
let activeId = null;
let wordData = [];    // [{word, pause}]
let words = [];       // cleaned strings
let idx = 0;
let playing = false;
let finished = false;
let timer = null;
let saveTimer = null;

// ══════════════════════════════════════
//  STORAGE (localStorage)
// ══════════════════════════════════════
const STORE_KEY = 'velocireader-library';

function loadLib() {
  try { library = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { library = []; }
}
function saveLib() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(library)); } catch(e) { console.error(e); }
}

// ══════════════════════════════════════
//  TEXT PROCESSING
// ══════════════════════════════════════
function extractWordsAndMeta(text) {
  const raw = text.split(/\s+/).filter(w => w.length > 0);
  const res = [];
  for (const w of raw) {
    const last = w.trim().slice(-1);
    let pause = 0;
    if ('.?!'.includes(last)) pause = 1.5;
    else if (';:'.includes(last)) pause = 1.0;
    else if (','.includes(last)) pause = 0.5;
    let c = w.replace(/[^a-zA-ZáéíóúñüÁÉÍÓÚÑÜàèìòùÀÈÌÒÙâêîôûÂÊÎÔÛäëïöüÄËÏÖÜçÇ0-9'\-]/g, '');
    c = c.replace(/^['\-]+|['\-]+$/g, '');
    if (c.length > 0) res.push({ word: c, pause });
  }
  return res;
}

function getORP(word) {
  const l = word.length;
  if (l<=1) return 0; if (l<=3) return 0; if (l<=5) return 1;
  if (l<=9) return 2; if (l<=13) return 3; return 4;
}

// ══════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════
function renderWord(w) {
  const box = document.getElementById('wordBox');
  if (!w) { box.innerHTML='<span class="w-before"></span><span class="w-focus"></span><span class="w-after"></span>'; return; }
  const o = getORP(w);
  box.innerHTML =
    `<span class="w-before">${w.slice(0,o)}</span>` +
    `<span class="w-focus">${w[o]}</span>` +
    `<span class="w-after">${w.slice(o+1)}</span>`;
}

function renderFinished() {
  document.getElementById('wordBox').innerHTML =
    '<span class="w-before"></span><span class="w-emoji">👍</span><span class="w-after"></span>';
}

function updateProgress() {
  const total = words.length;
  const pct = total > 0 ? (idx / total) * 100 : 0;
  document.getElementById('progressBar').style.width = Math.min(pct,100) + '%';
  document.getElementById('wordCounter').textContent = `${idx} / ${total}`;
  const wpm = parseInt(document.getElementById('readerWpm').value) || 250;
  const rem = total - idx;
  const secs = Math.ceil((rem / wpm) * 60);
  const m = Math.floor(secs/60), s = secs%60;
  document.getElementById('timeRemaining').textContent = `${m}:${String(s).padStart(2,'0')} remaining`;
}

// ══════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showLibrary() {
  renderLibrary();
  show('libraryScreen');
}

function showInput() {
  document.getElementById('textInput').value = '';
  document.getElementById('titleInput').value = '';
  resetDropZone();
  updateWordCount();
  switchTab('text');
  show('inputScreen');
}

function renderLibrary() {
  const container = document.getElementById('libraryList');
  if (library.length === 0) { container.innerHTML = ''; return; }
  let html = '<p class="lib-section-title">Your Readings</p>';
  for (const item of library) {
    const pct = item.totalWords > 0 ? Math.round((item.currentIndex / item.totalWords) * 100) : 0;
    const fin = pct >= 100;
    html += `
    <div class="lib-card" onclick="resumeReading('${item.id}')">
      <div class="lib-card-body">
        <div class="lib-title-row">
          <span class="lib-title">${esc(item.title)}</span>
          ${fin ? '<span style="font-size:.8rem">👍</span>' : ''}
        </div>
        <div class="lib-progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${Math.min(pct,100)}%"></div></div>
          <span class="lib-pct">${pct}%</span>
        </div>
        <p class="lib-meta">${item.totalWords} words / ${item.wpm} wpm</p>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteReading('${item.id}')" title="Delete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>`;
  }
  container.innerHTML = html;
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// ══════════════════════════════════════
//  INPUT SCREEN
// ══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.getElementById('textInput').style.display = tab==='text' ? '' : 'none';
  document.getElementById('dropZone').style.display = tab==='file' ? 'flex' : 'none';
}

function updateWordCount() {
  const w = extractWordsAndMeta(document.getElementById('textInput').value);
  const btn = document.getElementById('startBtn');
  btn.disabled = w.length === 0;
  const info = document.getElementById('wordCountInfo');
  const wpm = parseInt(document.getElementById('wpmInput').value) || 250;
  info.textContent = w.length > 0 ? `${w.length} words ~ ${Math.ceil(w.length/wpm)} min` : '';
}

// File handling — uses event delegation on dropZone so we never lose listeners
document.getElementById('textInput').addEventListener('input', updateWordCount);
document.getElementById('wpmInput').addEventListener('input', updateWordCount);

function bindDropZone() {
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='var(--accent)'; });
  dz.addEventListener('dragleave', () => { dz.style.borderColor=''; });
  dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor='';
    if(e.dataTransfer.files.length){ document.getElementById('fileInput').files=e.dataTransfer.files; handleFile(); }
  });
  document.getElementById('fileInput').addEventListener('change', handleFile);
}
bindDropZone();

function resetDropZone() {
  const dz = document.getElementById('dropZone');
  dz.innerHTML = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.35"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    <p style="color:var(--muted);font-size:.85rem">Drop a file or tap to browse</p>
    <span style="color:var(--muted);font-size:.68rem;opacity:.5;letter-spacing:1px">PDF / TXT / MD / HTML / CSV</span>
    <input type="file" id="fileInput" accept=".txt,.md,.html,.csv,.json,.log,.xml,.rtf,.pdf">`;
  // Rebind listener on the fresh file input
  document.getElementById('fileInput').addEventListener('change', handleFile);
}

function handleFile() {
  const fi = document.getElementById('fileInput');
  const file = fi.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const ti = document.getElementById('titleInput');
  if (!ti.value) ti.value = file.name.replace(/\.[^.]+$/,'');

  if (ext === 'pdf') {
    document.getElementById('dropZone').innerHTML =
      '<p style="color:var(--muted);font-size:.85rem">Loading PDF...</p>';
    loadPdfJs().then(() => {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const pdf = await pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise;
          let text = '';
          for (let i=1;i<=pdf.numPages;i++){
            const pg=await pdf.getPage(i);
            const c=await pg.getTextContent();
            text+=c.items.map(x=>x.str).join(' ')+' ';
          }
          document.getElementById('textInput').value = text;
          updateWordCount();
          const wc = extractWordsAndMeta(text).length;
          document.getElementById('dropZone').innerHTML =
            `<p class="file-loaded">${esc(file.name)}</p><p style="color:var(--muted);font-size:.75rem;margin-top:.3rem">${pdf.numPages} pages / ${wc} words</p>`;
        } catch(err) {
          console.error(err);
          document.getElementById('dropZone').innerHTML =
            '<p style="color:var(--accent);font-size:.85rem">Could not read PDF</p>';
        }
      };
      reader.readAsArrayBuffer(file);
    });
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      let text = e.target.result;
      if (ext==='html'||ext==='htm') {
        const doc = new DOMParser().parseFromString(text,'text/html');
        text = doc.body.textContent || '';
      }
      document.getElementById('textInput').value = text;
      updateWordCount();
      const wc = extractWordsAndMeta(text).length;
      document.getElementById('dropZone').innerHTML =
        `<p class="file-loaded">${esc(file.name)}</p><p style="color:var(--muted);font-size:.75rem;margin-top:.3rem">${wc} words</p>`;
    };
    reader.readAsText(file);
  }
}

// PDF.js loader
let pdfJsReady = false;
function loadPdfJs() {
  return new Promise((resolve, reject) => {
    if (pdfJsReady) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfJsReady = true; resolve();
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════
//  READER
// ══════════════════════════════════════
function startNewReading() {
  const text = document.getElementById('textInput').value;
  const title = document.getElementById('titleInput').value || 'Untitled';
  const wpm = parseInt(document.getElementById('wpmInput').value) || 250;
  wordData = extractWordsAndMeta(text);
  words = wordData.map(w => w.word);
  if (words.length === 0) return;

  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const reading = { id, title, text, wpm, currentIndex: 0, totalWords: words.length, createdAt: Date.now() };
  library.unshift(reading);
  saveLib();
  openReader(reading);
}

function resumeReading(id) {
  const item = library.find(r => r.id === id);
  if (!item) return;
  wordData = extractWordsAndMeta(item.text);
  words = wordData.map(w => w.word);
  openReader(item);
}

function openReader(reading) {
  activeId = reading.id;
  idx = reading.currentIndex || 0;
  finished = false;
  playing = false;
  document.getElementById('readerWpm').value = reading.wpm;
  document.getElementById('readerTitle').textContent = reading.title;
  document.getElementById('playIcon').style.display = '';
  document.getElementById('pauseIcon').style.display = 'none';

  if (idx >= words.length) {
    idx = words.length;
    finished = true;
    renderFinished();
  } else {
    renderWord(words[idx]);
  }
  updateProgress();
  show('readerScreen');
}

function exitReader() {
  stopPlay();
  saveProgress();
  activeId = null;
  showLibrary();
}

function deleteReading(id) {
  library = library.filter(r => r.id !== id);
  saveLib();
  renderLibrary();
}

function saveProgress() {
  if (!activeId) return;
  const wpm = parseInt(document.getElementById('readerWpm').value) || 250;
  const r = library.find(x => x.id === activeId);
  if (r) { r.currentIndex = idx; r.wpm = wpm; saveLib(); }
}

// Playback
function getBaseMs() {
  const wpm = parseInt(document.getElementById('readerWpm').value) || 250;
  return (60 / wpm) * 1000;
}

function getDelayForIndex(i) {
  const base = getBaseMs();
  const meta = wordData[i];
  return base + (meta ? base * meta.pause : 0);
}

function tick() {
  idx++;
  if (idx >= words.length) {
    idx = words.length;
    finished = true;
    stopPlay();
    renderFinished();
    updateProgress();
    saveProgress();
    return;
  }
  renderWord(words[idx]);
  updateProgress();
  saveProgress();
  timer = setTimeout(tick, getDelayForIndex(idx));
}

function togglePlay() { playing ? stopPlay() : startPlay(); }

function startPlay() {
  if (finished) { idx = 0; finished = false; renderWord(words[0]); }
  playing = true;
  document.getElementById('playIcon').style.display = 'none';
  document.getElementById('pauseIcon').style.display = '';
  timer = setTimeout(tick, getDelayForIndex(idx));
}

function stopPlay() {
  playing = false;
  clearTimeout(timer);
  document.getElementById('playIcon').style.display = '';
  document.getElementById('pauseIcon').style.display = 'none';
}

function skip(n) {
  const was = playing;
  if (playing) stopPlay();
  idx = Math.max(0, Math.min(words.length - 1, idx + n));
  finished = false;
  renderWord(words[idx]);
  updateProgress();
  saveProgress();
  if (was) startPlay();
}

// Live WPM change
document.getElementById('readerWpm').addEventListener('input', () => {
  if (playing) { clearTimeout(timer); timer = setTimeout(tick, getDelayForIndex(idx)); }
  updateProgress();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('readerScreen').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') skip(-1);
  if (e.code === 'ArrowRight') skip(1);
});

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
loadLib();
renderLibrary();

// Save progress when iOS kills the app (swipe up), tab switch, or browser close
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveProgress(); });
window.addEventListener('pagehide', saveProgress);
window.addEventListener('beforeunload', saveProgress);
window.addEventListener('freeze', saveProgress);   // Page Lifecycle API
</script>
